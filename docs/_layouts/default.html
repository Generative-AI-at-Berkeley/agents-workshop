<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title }}</title>
  <style>
    :root {
      --bg: #ffffff;
      --fg: #1a1a2e;
      --muted: #6b7280;
      --accent: #6366f1;
      --border: #e5e7eb;
      --code-bg: #f3f4f6;
      --nav-bg: #f9fafb;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f0f1a;
        --fg: #e5e7eb;
        --muted: #9ca3af;
        --accent: #818cf8;
        --border: #374151;
        --code-bg: #1e1e2e;
        --nav-bg: #1a1a2e;
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.7;
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    nav {
      background: var(--nav-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      margin-bottom: 2rem;
      font-size: 0.9rem;
    }
    nav a {
      color: var(--accent);
      text-decoration: none;
      margin-right: 1rem;
    }
    nav a:hover { text-decoration: underline; }
    h1 { font-size: 1.8rem; margin: 1.5rem 0 0.75rem; }
    h2 { font-size: 1.4rem; margin: 2rem 0 0.5rem; border-bottom: 1px solid var(--border); padding-bottom: 0.3rem; }
    h3 { font-size: 1.15rem; margin: 1.5rem 0 0.4rem; }
    p, li { margin-bottom: 0.5rem; }
    ul, ol { padding-left: 1.5rem; }
    a { color: var(--accent); }
    code {
      font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', monospace;
      font-size: 0.88em;
      background: var(--code-bg);
      padding: 0.15em 0.35em;
      border-radius: 4px;
    }
    pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem;
      overflow-x: auto;
      margin: 1rem 0;
    }
    pre code { background: none; padding: 0; font-size: 0.85em; }
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 1rem 0;
      font-size: 0.92em;
    }
    th, td {
      border: 1px solid var(--border);
      padding: 0.5rem 0.75rem;
      text-align: left;
    }
    th { background: var(--nav-bg); font-weight: 600; }
    blockquote {
      border-left: 3px solid var(--accent);
      padding: 0.5rem 1rem;
      margin: 1rem 0;
      color: var(--muted);
      background: var(--nav-bg);
      border-radius: 0 6px 6px 0;
    }
    .mermaid {
      text-align: center;
      margin: 1.5rem 0;
    }
    img { max-width: 100%; border-radius: 6px; }
    strong { font-weight: 600; }
  </style>
</head>
<body>
  <nav>
    <a href="{{ '/' | relative_url }}">Home</a>
    <a href="{{ '/lessons/overview/' | relative_url }}">Overview</a>
    <a href="{{ '/lessons/m1/' | relative_url }}">M1</a>
    <a href="{{ '/lessons/m2/' | relative_url }}">M2</a>
    <a href="{{ '/lessons/m3/' | relative_url }}">M3</a>
    <a href="{{ '/lessons/m4/' | relative_url }}">M4</a>
    <a href="{{ '/lessons/m5/' | relative_url }}">M5</a>
    <a href="{{ '/lessons/m6/' | relative_url }}">M6</a>
  </nav>

  {{ content }}

  <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    mermaid.initialize({
      startOnLoad: true,
      theme: window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'default',
      flowchart: { useMaxWidth: true, htmlLabels: true },
    });
  </script>
</body>
</html>
